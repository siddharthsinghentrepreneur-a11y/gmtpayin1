version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - npx prisma generate
        # Download AWS RDS TLS certificate bundle (public URL)
        - curl -so aws-rds-global-bundle.pem https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
